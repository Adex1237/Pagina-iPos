<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro - Selecciona tu perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <div class="logo-box">
                    <i class="fa-solid fa-shop"></i>
                </div>
                <div class="logo-text">
                    <span class="system-subtitle">SISTEMA</span>
                    <h1 class="system-title">POS Pro</h1>
                </div>
            </div>
            <p class="current-date">lunes, 15 de junio de 2026</p>
            <h2 class="section-title">Selecciona tu perfil</h2>
        </header>

        <main class="profiles-grid">
            
            <div class="profile-card">
                <div class="avatar avatar-orange">RS</div>
                <h3 class="profile-name">Roberto Sánchez</h3>
                <div class="profile-role text-muted">
                    <i class="fa-solid fa-shield-halved text-orange"></i> Gerente
                </div>
                <div class="profile-shift text-muted">Turno: Completo</div>
            </div>

            <div class="profile-card">
                <div class="avatar avatar-grey">ML</div>
                <h3 class="profile-name">María López</h3>
                <div class="profile-role text-muted">
                    <i class="fa-solid fa-user"></i> Cajero
                </div>
                <div class="profile-shift text-muted">Turno: Matutino</div>
            </div>

            <div class="profile-card">
                <div class="avatar avatar-grey">CR</div>
                <h3 class="profile-name">Carlos Ramírez</h3>
                <div class="profile-role text-muted">
                    <i class="fa-solid fa-user"></i> Cajero
                </div>
                <div class="profile-shift text-muted">Turno: Vespertino</div>
            </div>

            <div class="profile-card">
                <div class="avatar avatar-grey">AT</div>
                <h3 class="profile-name">Ana Torres</h3>
                <div class="profile-role text-muted">
                    <i class="fa-solid fa-user"></i> Cajero
                </div>
                <div class="profile-shift text-muted">Turno: Matutino</div>
            </div>

            <div class="profile-card">
                <div class="avatar avatar-blue">LM</div>
                <h3 class="profile-name">Laura Martínez</h3>
                <div class="profile-role text-muted">
                    <i class="fa-solid fa-briefcase"></i> Cliente
                </div>
            </div>

        </main>

        <footer class="footer">
            <p>POS Pro v2.5.0 · 11 tablas activ </p>
        </footer>
    </div>

    <button class="help-btn">?</button>

</body>
</html>
